meta_provider:
  provider_type: anthropic
  model: claude-3-7-sonnet-latest
  api_key_env: ANTHROPIC_API_KEY
  temperature: 0.2
  max_tokens: 4096

optimizer:
  max_iterations: 20
  max_accepts: 5
  max_meta_api_cost_usd: 100
  max_wall_clock_hours: 12
  screening_sample_size: 8
  archive_size: 10
  rerun_borderline_accepts: true
  duplicate_retry_limit: 5

agent:
  adapter: mini_swe_agent
  config:
    command: >-
      sh -lc 'mini -c mini.yaml
      -c agent.mode=yolo
      -c agent.confirm_exit=false
      -c model.cost_tracking=ignore_errors
      -c model.model_kwargs.custom_llm_provider=openai
      -c model.model_kwargs.api_base="$SUPERAGENT_BASE_URL"
      -m "$SUPERAGENT_MODEL"
      -t "$(cat "$SUPERAGENT_PROMPT_FILE")"
      --exit-immediately'
    model: openai/qwen2.5-coder:14b
    base_url: http://localhost:11434/v1
    api_key_env: OPENAI_API_KEY
    instruction_prefix: |
      Stay inside the prepared workspace, edit only source files, and finish by submitting the task.
    max_steps: 20
    per_action_timeout_sec: 90
    max_observation_chars: 12000
    tool_mode: native

eval:
  backend: code_benchmark
  config:
    benchmark_dir: artifacts/benchmark/v1
    min_train_delta_tasks: 1
    max_guard_regression_tasks: 1

guards:
  forbidden_paths:
    - tests/hidden
    - tests/visible
  forbidden_commands:
    - pip
    - curl
  no_network: true
  receipt_requirements:
    - commands
    - files_read
    - files_written
    - final_worktree_diff
