meta_provider:
  provider_type: builtin
  model: builtin-meta

optimizer:
  max_iterations: 3
  max_accepts: 1
  max_meta_api_cost_usd: 0
  max_wall_clock_hours: 1
  screening_sample_size: 2
  archive_size: 5
  rerun_borderline_accepts: true
  duplicate_retry_limit: 3

agent:
  adapter: mini_swe_agent
  config:
    command: >-
      python -c "import json; from pathlib import Path; task=json.loads(Path('task.json').read_text()); Path('response.txt').write_text(task['expected_output'])"
    model: demo/noop
    base_url: http://localhost:11434/v1
    api_key_env: ""
    instruction_prefix: ""
    max_steps: 1
    per_action_timeout_sec: 30
    max_observation_chars: 2000
    tool_mode: native

eval:
  backend: dataset
  config:
    dataset_path: examples/datasets/demo.jsonl
    scorer_type: exact_match
    min_train_delta: 1
    max_guard_regression: 1

guards:
  forbidden_paths: []
  forbidden_commands: []
  no_network: true
  receipt_requirements:
    - commands
    - files_read
    - files_written
    - final_worktree_diff
